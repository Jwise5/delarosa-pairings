<title>Delarosa | Pairings</title>
<style>
  :root {
    --red: #C0392B;
    --dark: #1a1a1a;
    --mid: #2d2d2d;
    --card: #252525;
    --border: #3a3a3a;
    --text: #f0ece4;
    --muted: #9a9590;
    --gold: #c9a84c;
    --wine: #7b2d4e;
    --beer: #c07a1a;
    --cocktail: #2a6e72;
    --white-wine: #6b7c3a;
    --accent: #e8d5b7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* HEADER */
  header {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo img {
    height: 32px;
    width: auto;
    display: block;
    margin-bottom: 4px;
    /* invert white logo for dark bg */
    filter: brightness(0) invert(1);
  }
  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* SPLASH SCREEN */
  #splash {
    position: fixed;
    inset: 0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 9999;
    transition: opacity 0.5s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  #splash img {
    width: 180px;
    filter: brightness(0) invert(1);
  }
  #splash .splash-sub {
    color: #9a9590;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #splash .splash-line {
    width: 40px;
    height: 1px;
    background: #C0392B;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    padding: 10px 12px 10px 38px;
    outline: none;
  }
  #search::placeholder { color: var(--muted); }

  /* FILTER TABS */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 6px 14px;
    white-space: nowrap;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .filter-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  /* CONTENT */
  main { padding: 12px 16px; }

  /* MODE TOGGLE */
  .mode-toggle {
    display: flex;
    background: var(--mid);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 16px;
  }
  .mode-btn {
    flex: 1;
    background: none;
    border: none;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 8px;
    text-align: center;
    transition: all 0.2s;
    -webkit-appearance: none;
  }
  .mode-btn.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* SECTION HEADERS */
  .section-label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 20px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* FOOD CARDS */
  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .item-card:active { border-color: var(--red); }
  .item-header {
    align-items: center;
    display: flex;
    justify-content: space-between;
    padding: 14px 16px;
  }
  .item-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }
  .item-desc {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }
  .chevron {
    color: var(--muted);
    margin-left: 10px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .item-card.open .chevron { transform: rotate(90deg); }
  .pairings-panel {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }
  .item-card.open .pairings-panel { display: block; }
  .pairing-section {
    margin-top: 12px;
  }
  .pairing-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .pairing-label.wine { color: var(--gold); }
  .pairing-label.cocktail { color: #7ecac8; }
  .pairing-label.beer { color: #e0a84a; }
  .pairing-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    line-height: 1.4;
  }
  .chip.wine { background: rgba(123,45,78,0.3); border: 1px solid rgba(123,45,78,0.6); color: #e8a0b8; }
  .chip.cocktail { background: rgba(42,110,114,0.3); border: 1px solid rgba(42,110,114,0.6); color: #7ecac8; }
  .chip.beer { background: rgba(192,122,26,0.3); border: 1px solid rgba(192,122,26,0.6); color: #e8c47a; }
  .chip.note { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-style: italic; }

  /* BEVERAGE CARDS */
  .bev-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    cursor: pointer;
  }
  .bev-header {
    align-items: center;
    display: flex;
    padding: 14px 16px;
    gap: 12px;
  }
  .bev-icon {
    font-size: 22px;
    flex-shrink: 0;
  }
  .bev-info { flex: 1; }
  .bev-name {
    font-size: 15px;
    font-weight: 600;
    text-transform: capitalize;
  }
  .bev-sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }
  .bev-type-tag {
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 7px;
    text-transform: uppercase;
  }
  .bev-type-tag.red-wine { background: rgba(123,45,78,0.3); color: #e8a0b8; }
  .bev-type-tag.white-wine { background: rgba(107,124,58,0.3); color: #c5d88a; }
  .bev-type-tag.sparkling { background: rgba(201,168,76,0.2); color: var(--gold); }
  .bev-type-tag.cocktail { background: rgba(42,110,114,0.3); color: #7ecac8; }
  .bev-type-tag.beer { background: rgba(192,122,26,0.3); color: #e8c47a; }
  .bev-panel {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }
  .bev-card.open .bev-panel { display: block; }
  .bev-card.open .chevron { transform: rotate(90deg); }
  .food-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .food-chip {
    background: rgba(240,236,228,0.08);
    border: 1px solid rgba(240,236,228,0.15);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 4px 10px;
  }
  .pairs-with-label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 12px;
    margin-bottom: 6px;
  }

  /* NO RESULTS */
  .no-results {
    color: var(--muted);
    font-size: 15px;
    text-align: center;
    padding: 40px 20px;
  }
</style>
</head>

let currentMode = 'food';
let currentFilter = 'all';
let currentSearch = '';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeFood').classList.toggle('active', mode === 'food');
  document.getElementById('modeDrink').classList.toggle('active', mode === 'drink');
  document.getElementById('foodView').style.display = mode === 'food' ? 'block' : 'none';
  document.getElementById('drinkView').style.display = mode === 'drink' ? 'block' : 'none';
  document.getElementById('filters').style.display = mode === 'food' ? 'flex' : 'none';
  render();
}

function render() {
  if (currentMode === 'food') renderFood();
  else renderDrinks();
}

function renderFood() {
  const container = document.getElementById('foodView');
  const q = currentSearch.toLowerCase();

  let items = MENU;
  if (currentFilter !== 'all') items = items.filter(i => i.category === currentFilter);
  if (q) items = items.filter(i =>
    i.name.toLowerCase().includes(q) ||
    i.desc.toLowerCase().includes(q) ||
    i.category.toLowerCase().includes(q) ||
    [...i.wines, ...i.cocktails, ...i.beers].some(b => b.toLowerCase().includes(q))
  );

  if (!items.length) {
    container.innerHTML = '<div class="no-results">No matches found</div>';
    return;
  }

  const groups = {};
  items.forEach(i => {
    if (!groups[i.category]) groups[i.category] = [];
    groups[i.category].push(i);
  });

  let html = '';
  for (const [cat, catItems] of Object.entries(groups)) {
    html += `<div class="section-label">${cat}</div>`;
    catItems.forEach(item => {
      html += `
        <div class="item-card" id="card-${item.id}" onclick="toggleCard(${item.id})">
          <div class="item-header">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-desc">${item.desc}</div>
            </div>
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="m9 18 6-6-6-6"/>
            </svg>
          </div>
          <div class="pairings-panel">
            ${item.wines.length ? `
            <div class="pairing-section">
              <div class="pairing-label wine">🍷 Best Wines</div>
              <div class="pairing-chips">
                ${item.wines.map(w => `<span class="chip wine">${w}</span>`).join('')}
              </div>
            </div>` : ''}
            ${item.cocktails.length ? `
            <div class="pairing-section">
              <div class="pairing-label cocktail">🍸 Cocktails</div>
              <div class="pairing-chips">
                ${item.cocktails.map(c => `<span class="chip cocktail">${c}</span>`).join('')}
              </div>
            </div>` : ''}
            ${item.beers.length ? `
            <div class="pairing-section">
              <div class="pairing-label beer">🍺 Beer</div>
              <div class="pairing-chips">
                ${item.beers.map(b => `<span class="chip beer">${b}</span>`).join('')}
              </div>
            </div>` : ''}
            ${item.note ? `
            <div class="pairing-section">
              <div class="pairing-chips">
                <span class="chip note">💡 ${item.note}</span>
              </div>
            </div>` : ''}
          </div>
        </div>`;
    });
  }
  container.innerHTML = html;
}

function renderDrinks() {
  const container = document.getElementById('drinkView');
  const q = currentSearch.toLowerCase();

  const typeOrder = ['sparkling','white-wine','red-wine','cocktail','beer'];
  const typeLabels = {
    sparkling: '🥂 Sparkling, Rosé & White (Sparkling)',
    'white-wine': '🍾 White Wine',
    'red-wine': '🍷 Red Wine',
    cocktail: '🍸 Cocktails',
    beer: '🍺 Beer'
  };

  let bevs = BEVERAGES;
  if (q) bevs = bevs.filter(b =>
    b.name.toLowerCase().includes(q) ||
    b.sub.toLowerCase().includes(q) ||
    b.foods.some(f => f.toLowerCase().includes(q))
  );

  if (!bevs.length) {
    container.innerHTML = '<div class="no-results">No matches found</div>';
    return;
  }

  let html = '';
  typeOrder.forEach(type => {
    const group = bevs.filter(b => b.type === type);
    if (!group.length) return;
    html += `<div class="section-label">${typeLabels[type]}</div>`;
    group.forEach(bev => {
      html += `
        <div class="bev-card" id="bcard-${bev.id}" onclick="toggleBevCard('${bev.id}')">
          <div class="bev-header">
            <div class="bev-icon">${bev.icon}</div>
            <div class="bev-info">
              <div class="bev-name">${bev.name}</div>
              <div class="bev-sub">${bev.sub}</div>
            </div>
            <span class="bev-type-tag ${bev.type}">${bev.type.replace('-',' ')}</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-left:8px;flex-shrink:0;">
              <path d="m9 18 6-6-6-6"/>
            </svg>
          </div>
          <div class="bev-panel">
            <div class="pairs-with-label">Pairs with</div>
            <div class="food-chips">
              ${bev.foods.map(f => `<span class="food-chip">${f}</span>`).join('')}
            </div>
          </div>
        </div>`;
    });
  });
  container.innerHTML = html;
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function toggleBevCard(id) {
  const el = document.getElementById('bcard-' + id);
  el.classList.toggle('open');
}

// Filters
document.getElementById('filters').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    render();
  }
});

// Search
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

// Initial render
render();

// Splash screen — hide after 1.6s
window.addEventListener('load', () => {
  setTimeout(() => {
    const splash = document.getElementById('splash');
    splash.classList.add('hidden');
    setTimeout(() => splash.remove(), 500);
  }, 1600);
});
</script>
